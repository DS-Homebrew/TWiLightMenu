DSIWARE_DS_MODE_P2=Jos haluat parantaa yhteensopivuutta,\nja tallentaa tietoja\nuseammassa nimikkeessä, käynnistä\nTWiLight Menu++ uudelleen\nkonsolin SD-korttipaikasta.
RAM_LIMIT_GAME_PART_ONLY=Muistin rajallisuuden vuoksi\nvain osaa tästä pelistä voi pelata\n. Jos haluat pelata koko peliä,\nkäynnistä tämä Nintendo DSi-\ntai 3DS-järjestelmällä.
RAM_LIMIT_NO_AUDIO=Muistin rajoitusten vuoksi\nääntä ei toisteta.\nJos haluat pelata tätä peliä äänen kanssa,\nkäynnistä peli Nintendo DSi-\ntai 3DS-järjestelmällä.
RAM_LIMIT_NO_AUDIO_MEP=Muistirajoitusten vuoksi\nääntä ei toisteta.\nJos haluat pelata tätä peliä äänen kanssa,\naseta muistinlaajennuskortti.
RAM_LIMIT_NO_MUSIC=Muistirajoitusten vuoksi\nmusiikkia ei toisteta. Jos\nhaluat pelata tätä peliä\nmusiikin kanssa, käynnistä\ntämä Nintendo DSi tai\n3DS-järjestelmällä.
RAM_LIMIT_NO_FMV=Muistirajoitusten vuoksi\nFMV:tä ei toisteta. FMV:n\ntoistoa varten käynnistä\ntämä Nintendo DSi- tai\n3DS-järjestelmällä.
RAM_LIMIT_SPECIFIC_AREA=Muistirajoitusten vuoksi\npeli kaatuu tietyllä\nalueella. Voit kiertää kaatumisen\nkäynnistämällä tämän Nintendo DSi\ntai 3DS-järjestelmillä.
RAM_LIMIT_CERTAIN_POINT=Muistirajoitusten vuoksi peli\nkaatuu tietyissä kohdissa. Voit\nkiertää kaatumisen käynnistämällä\npelin Nintendo DSi tai\n3DS-järjestelmissä.
RAM_LIMIT_STATE=Muistirajoitusten vuoksi\npeli toimii rajoitetusti.\nPelataksesi täysversiota,\nkäynnistä se Nintendo DSi\ntai 3DS-järjestelmällä.
RAM_LIMIT_NO_SAVE_STATE=Koska tallennustukea ei ole,\npeli toimii rajoitetussa\ntilassa. Jos haluat pelata täysversiota,\nkäynnistä tämä Nintendo DSi-\ntai 3DS-järjestelmillä.
RAM_LIMIT_NO_SOUND_FX=Muistirajoitusten vuoksi\näänitehosteita ei toisteta.\nPelataksesi tätä peliä\näänitehosteiden kanssa,\nkäynnistä se Nintendo DSi-\ntai 3DS-järjestelmällä.
INSERT_MEMORY_EXPANSION_PAK=Käynnistääksesi tämän pelin,\naseta Memory Expansion Pak.
INSERT_SLOT2_RAM_CART=Käynnistääksesi tämän pelin,\nkatkaise VIRTA ja aseta paikalleen\nSlot-2-muistilaajennuskortti,\njoka ei ole Memory Expansion Pak.
INSERT_LARGER_THAN_MEP=Tämä peli vaatii enemmän\nmuistia kuin laajennuskortissa\non. Katkaise virta ja aseta\npaikalleen Slot-2-kortti,\njossa on enemmän muistia.
MEMORY_EXPANSION_PAK_UNAVAILABLE=Tämä peli vaatii\nmuistilaajennuskortin, mutta\nsille tarvittavaa paikkaa ei\nole olemassa. Tästä johtuen\npeliä ei voida käynnistää.
SLOT2_RAM_CART_UNAVAILABLE=Tämä peli vaatii Slot-2-\nlaajennuskortin, mutta sille\ntarvittavaa paikkaa ei ole\nolemassa. Tästä johtuen peliä\nei voida käynnistää.
TWLMENU_ALREADY_RUNNING=TWiLight Menu++ on\njo käynnissä.
CANNOT_LAUNCH_WITHOUT_SD=Tätä peliä ei voi käynnistää\nilman SD-korttia.
CANNOT_LAUNCH_IN_DS_MODE=Tätä peliä ei voi käynnistää\nDS-tilassa.
CANNOT_LAUNCH_HB_ON_3DS=Tätä homebrewta ei voi\nkäynnistää 3DS-konsoleilla.
CANNOT_LAUNCH_WITH_UI=Tätä peliä ei voida käynnistää.\nVaihda eri käyttöliittymään ja\nyritä uudelleen.
CANNOT_LAUNCH_CORRUPT_TITLE_SD=Tätä peliä ei voida käynnistää.\nJoko peli tai SD-kortti on\nvioittunut.
CANNOT_LAUNCH_CORRUPT_TITLE_MICRO_SD=Tätä peliä ei voida käynnistää.\nJoko peli tai microSD-kortti on\nvioittunut.
PRESS_B_RETURN=Palaa painamalla \B.
BAD_CLUSTER_SIZE=SD-korttiasi ei ole alustettu\nkäyttäen 32 kt:n klustereita, mikä\naiheuttaa joidenkin pelien latautumisen\nhyvin hitaasti. On suositeltavaa\nalustaa SD-kortti uudelleen käyttäen\n32 kt:n klustereita.

